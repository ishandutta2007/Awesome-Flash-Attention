<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f1a3a" />
    </linearGradient>

    <!-- Text Gradient (Neon Violet to Cyan) -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#374151" stroke-width="0.7" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Neon Abstract Waves / Lines representing sequence & tiling -->
  <g opacity="0.6">
    <path d="M-100 350 C 300 350, 200 50, 600 150 C 1000 250, 900 50, 1300 50" fill="none" stroke="url(#text-grad)" stroke-width="4" filter="url(#glow)" />
    <path d="M-100 250 C 200 150, 400 350, 700 200 C 1000 50, 1000 300, 1300 200" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.8" />
  </g>

  <!-- Geometric Blocks (Tiling representations) -->
  <g transform="translate(900, 80)" opacity="0.8">
    <!-- Block 1 -->
    <rect x="0" y="0" width="80" height="80" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2" />
    <rect x="15" y="15" width="50" height="50" rx="5" fill="url(#text-grad)" opacity="0.8" />
    <!-- Block 2 -->
    <rect x="100" y="50" width="80" height="80" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="2" />
    <rect x="115" y="65" width="50" height="50" rx="5" fill="#06b6d4" opacity="0.8" />
    <!-- Connecting flow -->
    <path d="M 85 40 L 95 90" stroke="#f43f5e" stroke-width="2" stroke-dasharray="4" />
  </g>

  <!-- Title & Subtitle -->
  <g transform="translate(80, 160)">
    <!-- Decorative Tag -->
    <rect x="0" y="-80" width="160" height="30" rx="15" fill="#1e293b" stroke="#3b82f6" stroke-width="1" />
    <text x="80" y="-60" fill="#3b82f6" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" letter-spacing="1.5" text-anchor="middle">AWESOME LIST</text>

    <!-- Main Title -->
    <text x="0" y="0" fill="url(#text-grad)" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="900" letter-spacing="2" filter="url(#glow)">FLASH-ATTENTION</text>
    
    <!-- Subtitle -->
    <text x="0" y="50" fill="#9ca3af" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="500" letter-spacing="1">High-Performance Variants, Types, &amp; Deployments</text>
    <text x="0" y="80" fill="#6b7280" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-style="italic">Accelerating Transformers through Hardware-Aware Attention</text>
  </g>

  <!-- Bottom Accent bar -->
  <rect x="0" y="390" width="1200" height="10" fill="url(#text-grad)" />
</svg>
